services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: bfhl-backend
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  # ── Frontend (static site) ───────────────────────────────────────────────────
  - type: web
    name: bfhl-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bfhl-backend.onrender.com
